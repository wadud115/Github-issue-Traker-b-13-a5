<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


        <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">


     <!-- link css -->

    <link rel="stylesheet" href="styles.css">

    <!-- font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


<!-- tailwind and daisy ui -->


<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


<!-- font awesome -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>


<body class="bg-[#F8FAFC] ">


    <!-- navber -->


  <header class="bg-base-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 py-2">
    
    <div class="flex items-center justify-between">

      <!-- Left (Logo + Title) -->
      <div class="flex items-center gap-2">
        <img src="./assets/github-logo.png" class="w-[36px]" alt="">
        <h2 class="text-lg md:text-xl font-semibold">GitHub Issues Tracker</h2>
      </div>

      <!-- Hamburger (Mobile only) -->
      <button id="menu-btn" class="md:hidden text-2xl">
        ☰
      </button>

      <!-- Right Menu -->
      <div id="menu" class="hidden md:flex items-center gap-4">

        <!-- Search -->
        <div class="flex gap-2 w-full md:w-auto">
          <input id="search-desktop" type="text"
            placeholder="Search issues..."
            class="input input-bordered w-full md:w-auto" />
          
          <button onclick="searchIssue()" class="btn btn-primary">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>

        <!-- New Issue -->
        <button class="btn btn-primary w-[20px]  md:w-auto">
          <i class="fa-solid fa-plus"></i> New Issue
        </button>

      </div>

    </div>

    <!-- Mobile Dropdown -->
    <div id="mobile-menu" class="hidden flex-col gap-3 mt-3 md:hidden">

      <div class="flex justify-center my-4 gap-2">
        <input id="search-mobile" type="text"
          placeholder="Search issues..."
          class="input input-bordered " />
        
        <button onclick="searchIssue()" class="btn btn-primary">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>

      <div class="flex justify-center">
      <button class="btn btn-primary ">
        <i class="fa-solid fa-plus"></i> New Issue
      </button>
      </div>

    </div>

  </div>
</header>


 <div class="tabs 
    w-11/12 mx-auto flex justify-center mt-10 bg-[#FFFFFF] rounded-lg p-4 shadow-md">
  <button class="tab active" onclick="changeTab('all', this)">All</button>
  <button class="tab" onclick="changeTab('open', this)">Open</button>
  <button class="tab" onclick="changeTab('closed', this)">Closed</button>
</div>


   <section class=" info flex justify-between items-center
    w-11/12 mx-auto my-6 bg-[#FFFFFF] rounded-lg p-4 shadow-md ">



   <!-- main part 1 -->
    <div class="flex justify-between items-center gap-3" >


      <div><img class="bg-[#ECE4FF] rounded-full p-2" src="./assets/Aperture.png" alt=""></div>

      <div>
        <h id="count" class="font-bold text-xl">0 Issues</h>
        <p class="text-[#64748B]">Track and manage your project issues</p>
      </div>

    </div>


    <div class="status-btn flex justify-between items-center gap-3">

      <div class="flex items-center justify-between gap-2">
        <div aria-label="success" class="status status-success"></div>
        <p>Open</p>

      </div>


      <div class="flex items-center justify-between gap-2">
       <div aria-label="status" class="status status-primary"></div>
        <p>Open</p>

      </div>

    </div>
    
   </section>

<section class=" bg-[#E4E4E7] w-11/12 mx-auto py-5 rounded-sm ">

   <div id="issues" class="grid grid-cols-1 md:grid-cols-4 gap-4 p-4 md:gap-3  "></div>

   </section>







   <script src="./home.js"></script>



    


    
</body>
</html>
